<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Paste Bridge</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 6px 10px;
      color: var(--vscode-foreground);
      background: var(--vscode-editor-background);
      font-size: 11px;
      margin: 0;
    }
    .info {
      opacity: 0.7;
      font-style: italic;
    }
    #log {
      max-height: 100px;
      overflow: auto;
      font-family: var(--vscode-editor-font-family, monospace);
      font-size: 10px;
      opacity: 0.7;
      margin-top: 6px;
      white-space: pre-wrap;
    }
    #focus-input {
      position: absolute;
      opacity: 0;
      width: 1px;
      height: 1px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <input id="focus-input" type="text" tabindex="-1" aria-hidden="true" />
  <div class="info">Ponte de clipboard para o terminal. Funciona em segundo plano — nao precisa interagir com este painel.</div>
  <div id="log"></div>

  <script>
    const vscode = acquireVsCodeApi();
    const logEl = document.getElementById('log');
    const focusInput = document.getElementById('focus-input');

    function uiLog(msg) {
      const line = document.createElement('div');
      line.textContent = '[' + new Date().toISOString().slice(11, 23) + '] ' + msg;
      logEl.appendChild(line);
      while (logEl.children.length > 30) {
        logEl.removeChild(logEl.firstChild);
      }
      logEl.scrollTop = logEl.scrollHeight;
      vscode.postMessage({ type: 'log', message: msg });
    }

    function blobToDataUrl(blob) {
      return new Promise(function (resolve, reject) {
        const r = new FileReader();
        r.onload = function () { resolve(r.result); };
        r.onerror = function () { reject(r.error || new Error('FileReader erro')); };
        r.readAsDataURL(blob);
      });
    }

    async function handleReadRequest(requestId) {
      uiLog('Pedido de leitura requestId=' + requestId);
      try {
        window.focus();
        focusInput.focus();
      } catch (e) { /* ignore */ }

      try {
        const items = await navigator.clipboard.read();
        for (const item of items) {
          for (const t of item.types) {
            if (t.indexOf('image/') === 0) {
              const blob = await item.getType(t);
              const dataUrl = await blobToDataUrl(blob);
              uiLog('Imagem encontrada (' + t + ', ' + blob.size + ' bytes)');
              vscode.postMessage({
                type: 'image-result',
                mime: t,
                dataUrl: dataUrl,
                requestId: requestId,
              });
              return;
            }
          }
        }
        uiLog('Nenhuma imagem no clipboard.');
        vscode.postMessage({ type: 'empty', requestId: requestId });
      } catch (e) {
        uiLog('Erro: ' + e.name + ' - ' + e.message);
        vscode.postMessage({
          type: 'error',
          code: e.name || 'UnknownError',
          message: e.message || String(e),
          requestId: requestId,
        });
      }
    }

    window.addEventListener('message', function (event) {
      const msg = event.data || {};
      if (msg.type === 'readClipboard' && typeof msg.requestId === 'string') {
        handleReadRequest(msg.requestId);
      }
    });

    uiLog('Bridge pronto.');
  </script>
</body>
</html>
