name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "vsix=terminal-bridge-${VERSION}.vsix" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Tag version ${{ steps.version.outputs.version }} does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Compile TypeScript
        run: npm run compile

      - name: Package extension
        run: npm run package

      - name: Verify VSIX was produced
        run: |
          if [ ! -f "${{ steps.version.outputs.vsix }}" ]; then
            echo "::error::Expected file ${{ steps.version.outputs.vsix }} not found"
            ls -la
            exit 1
          fi

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "::error::OVSX_PAT secret is not set. Add it under repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          npx ovsx --pat "$OVSX_PAT" publish "${{ steps.version.outputs.vsix }}" --skip-duplicate

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section between "## [VERSION]" and the next "## [...]" header
          awk -v ver="$VERSION" '
            BEGIN { found = 0 }
            /^## \[/ {
              if (found) { exit }
              if ($0 ~ "^## \\[" ver "\\]") { found = 1; next }
            }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release $VERSION. See [CHANGELOG.md](./CHANGELOG.md) for details." > release-notes.md
          fi
          echo "Release notes for v$VERSION:"
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "${{ steps.version.outputs.vsix }}" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
